<!DOCTYPE html>
<html lang="ru">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document signing</title>
  <link rel="stylesheet" href="https://use.typekit.net/ytu6skd.css">
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: "clother", sans-serif; font-weight: 400; font-style: normal; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    h1 { margin-bottom: 10px; }
    p { color: #aaa; margin-bottom: 10px; text-align: center; max-width: 500px; }
    #holdIndicator {
      position: absolute; left: 16px; bottom: 16px; z-index: 10;
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.9);
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      pointer-events: none;
      overflow: hidden;
    }
    #holdIndicator::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, rgba(0,220,110,0.7) 0%, rgba(0,220,110,0.7) calc(var(--hold-progress, 0) * 0.5%), transparent calc(var(--hold-progress, 0) * 0.5%));
      opacity: 0; transition: opacity 0.15s;
    }
    #holdIndicator.filling::before { opacity: 1; }
    #holdIndicator.ready {
      background: rgba(0,200,100,0.4);
      color: rgba(255,255,255,0.95);
    }
    #holdIndicator .holdLabel { position: relative; z-index: 1; }
    #videoOverlay #container { position: relative; max-width: 100%; background: transparent; overflow: hidden; border-radius: 20px; }
    #videoOverlay #video { max-width: 100%; height: auto; display: block; transform: scaleX(-1); }
    #videoOverlay #canvas, #videoOverlay #drawCanvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); pointer-events: none; }
    .btn { background: #4fc3f7; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 5px; }
    .btn:hover { background: #81d4fa; }
    #status { color: #fff; font-size: 16px; margin-top: 20px; text-align: center; display: none; }
    #signModal {
      display: none; position: fixed; inset: 0; z-index: 100;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.35);
      flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; gap: 20px; box-sizing: border-box;
    }
    #signModal.visible { display: flex; }
    #signModalPreview {
      width: 100%; max-width: 400px; aspect-ratio: 1.6; min-height: 250px;
      background: rgba(249, 250, 251, 0.5);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.15s ease-out;
    }
    #signModalPreview canvas {
      max-width: 100%; max-height: 100%; object-fit: contain;
      background: transparent;
    }
    #signModalBtns {
      display: flex; justify-content: space-between; gap: 20px;
      width: 100%; max-width: 400px; margin: 0 20px; box-sizing: border-box;
    }
    #signModalBtns .btn {
      flex: 0 0 auto; height: 40px; border-radius: 120px; padding: 0 20px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      position: relative; overflow: hidden; transition: transform 0.15s ease;
      font-size: 20px; font-family: "clother", sans-serif; font-weight: 400; letter-spacing: -0.6px;
    }
    #signModalBtns .btn .btnProgress {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
      border-radius: 120px; transition: width 0.08s ease-out; pointer-events: none;
    }
    #resignBtn {
      background: #fff; color: #000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    #resignBtn .btnProgress { background: rgba(0,56,233,0.2); }
    #resignBtn.activating .btnProgress { background: rgba(0,56,233,0.4); }
    #resignBtn.activating { transform: scale(1.02); }
    #resignBtn:hover { background: #f8f9fa; }
    #signConfirmBtn {
      background: #0038e9; color: #fff;
      box-shadow: 0 4px 16px rgba(0,56,233,0.35);
    }
    #signConfirmBtn .btnProgress { background: rgba(255,255,255,0.3); }
    #signConfirmBtn.activating .btnProgress { background: rgba(255,255,255,0.4); }
    #signConfirmBtn.activating { transform: scale(1.02); }
    #signConfirmBtn:hover { background: #0044ff; }
    #signModalBtns .btn .btnLabel { position: relative; z-index: 1; }
    #docScreen {
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; max-width: 700px; margin: 0 auto;
    }
    #docSheet {
      width: 100%; max-width: 600px; aspect-ratio: 1/1.414;
      background: #fff; border-radius: 2px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
      position: relative; overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.12s ease-out;
    }
    #docSheet canvas { display: block; width: 100%; height: 100%; object-fit: contain; }
    #buttonsRow {
      position: absolute; top: calc(100% + 20px); left: 0; right: 0;
      min-height: 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #addDocBtn {
      background: #fff; color: #1a1a2e; border: none;
      padding: 12px 20px 8px; border-radius: 120px;
      font-size: 16px; font-weight: 500; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: transform 0.15s, background 0.15s;
    }
    #addDocBtn:hover { background: #f5f5f5; transform: scale(1.02); }
    #exportBtn {
      background: #0038e9; color: #fff; border: none;
      padding: 12px 24px 8px; border-radius: 120px;
      font-size: 16px; font-weight: 500; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,56,233,0.35);
      transition: transform 0.15s, background 0.15s;
    }
    #exportBtn:hover { background: #0044ff; transform: scale(1.02); }
    #exportBtn.hidden { display: none; }
    #rightButtons { display: flex; align-items: center; }
    #docSignBtn {
      background: #0038e9; color: #fff; border: none;
      padding: 12px 24px 8px; border-radius: 120px;
      font-size: 16px; font-weight: 500; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,56,233,0.35);
      transition: transform 0.15s, background 0.15s;
    }
    #docSignBtn:hover { background: #0044ff; transform: scale(1.02); }
    #docSignBtn.hidden { display: none; }
    #signatureContainer {
      position: absolute; right: 8%; bottom: 10%; width: 42%; min-height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: grab; user-select: none; touch-action: none;
    }
    #signatureContainer.has-signature { width: 42%; min-height: 180px; }
    #signatureContainer.has-signature img { width: 100%; height: auto; max-height: 240px; object-fit: contain; }
    #signatureContainer:active { cursor: grabbing; }
    #signatureContainer.hidden { display: none; }
    #signatureContainer canvas, #signatureContainer img { max-width: 100%; max-height: 240px; object-fit: contain; pointer-events: none; min-width: 0; }
    #signatureContainer canvas { transform: none; }
    #signatureContainer img { transform: scaleX(-1); }
    #videoOverlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: transparent; padding: 20px; box-sizing: border-box;
      visibility: hidden; pointer-events: none;
      overflow: hidden;
    }
    #videoOverlay.visible {
      visibility: visible; pointer-events: auto;
    }
    #videoOverlay.tv-on {
      animation: tvOn 0.9s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes tvOn {
      0% {
        clip-path: inset(49.9% 0 49.9% 0);
        filter: brightness(0.1);
      }
      8% {
        clip-path: inset(49.5% 0 49.5% 0);
        filter: brightness(0.4);
      }
      15% {
        clip-path: inset(49% 0 49% 0);
        filter: brightness(0.9);
      }
      20% {
        clip-path: inset(45% 0 45% 0);
        filter: brightness(1.1);
      }
      35% {
        clip-path: inset(25% 0 25% 0);
        filter: brightness(1);
      }
      55% {
        clip-path: inset(8% 0 8% 0);
      }
      75% {
        clip-path: inset(2% 0 2% 0);
      }
      100% {
        clip-path: inset(0 0 0 0);
        filter: brightness(1);
      }
    }
    #videoOverlay .scanlines {
      position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      opacity: 0; animation: scanFade 0.9s 0.5s forwards;
    }
    @keyframes scanFade { to { opacity: 0.25; } }
    #docStatus:empty { display: none; }
    body.videoOverlayActive #buttonsRow { display: none; }
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <div id="docScreen" class="screen active">
    <div id="docSheetWrapper" style="position: relative; width: 100%; max-width: 600px;">
      <div id="docSheet">
        <canvas id="pdfCanvas"></canvas>
        <div id="signatureContainer" class="hidden"></div>
      </div>
      <div id="status">Loading...</div>
      <input type="file" id="addDocInput" accept=".pdf,image/*,application/pdf" style="display:none">
      <div id="buttonsRow">
        <button id="addDocBtn">Add your own document</button>
        <div id="rightButtons">
          <button id="docSignBtn">Sign</button>
          <button id="exportBtn" class="hidden">Export</button>
        </div>
      </div>
    </div>
    <p id="docStatus" style="color:#4fc3f7; margin-top:16px; font-size:14px;"></p>
  </div>

  <div id="videoOverlay">
    <div class="scanlines"></div>
    <div id="container">
      <div id="holdIndicator"><span class="holdLabel">hold</span></div>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>
  </div>

  <div id="signModal">
    <div id="signModalPreview">
      <canvas id="signPreviewCanvas"></canvas>
    </div>
    <div id="signModalBtns">
      <button class="btn" id="resignBtn"><span class="btnProgress"></span><span class="btnLabel">Reset&#8202;🖕</span></button>
      <button class="btn" id="signConfirmBtn"><span class="btnProgress"></span><span class="btnLabel">Sign&#8202;👌</span></button>
    </div>
  </div>

  <script type="module">
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const drawCanvas = document.getElementById('drawCanvas');
    const drawCtx = drawCanvas.getContext('2d');
    const status = document.getElementById('status');
    const holdIndicator = document.getElementById('holdIndicator');

    const MODEL_URL = 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task';
    const FINGER_TIP = 8;
    const STILL_THRESHOLD_PX = 20;
    const INDEX_HOLD_THRESHOLD_PX = 10;
    const STILL_FRAMES_3SEC = 90;
    const INDEX_HOLD_FRAMES = 45;
    const GESTURE_CONFIRM_FRAMES = 45;
    const COUNTDOWN_FRAMES = 30;
    const FIST_RATIO_THRESHOLD = 1.3;
    const FIST_INDEX_RATIO = 1.12;
    const INDEX_EXTENDED_RATIO = 1.8;
    const FINGER_CURLED_RATIO = 1.6;

    function getFingerDistances(lm) {
      const wrist = lm[0];
      const palmBase = lm[9];
      const handSize = Math.hypot(palmBase.x - wrist.x, palmBase.y - wrist.y) || 0.01;
      const dist3d = (a, b) => {
        const dx = (a.x ?? 0) - (b.x ?? 0);
        const dy = (a.y ?? 0) - (b.y ?? 0);
        const dz = (a.z ?? 0) - (b.z ?? 0);
        return Math.hypot(dx, dy, dz);
      };
      const scale = dist3d(palmBase, wrist) || 0.01;
      return {
        d8: dist3d(lm[8], wrist) / scale,
        d12: dist3d(lm[12], wrist) / scale,
        d16: dist3d(lm[16], wrist) / scale,
        d20: dist3d(lm[20], wrist) / scale
      };
    }

    function isFist(lm) {
      const { d8, d12, d16, d20 } = getFingerDistances(lm);
      return d8 < FIST_INDEX_RATIO && d12 < FIST_RATIO_THRESHOLD && d16 < FIST_RATIO_THRESHOLD && d20 < FIST_RATIO_THRESHOLD;
    }

    function isIndexPointing(lm) {
      const { d8, d12, d16, d20 } = getFingerDistances(lm);
      return d8 >= INDEX_EXTENDED_RATIO && d12 < FINGER_CURLED_RATIO && d16 < FINGER_CURLED_RATIO && d20 < FINGER_CURLED_RATIO;
    }

    function isOtherFingersCurled(lm) {
      const { d12, d16, d20 } = getFingerDistances(lm);
      return d12 < FINGER_CURLED_RATIO && d16 < FINGER_CURLED_RATIO && d20 < FINGER_CURLED_RATIO;
    }

    function isIndexExtendedRelative(lm) {
      const { d8, d12, d16, d20 } = getFingerDistances(lm);
      return d8 > d12 && d8 > d16 && d8 > d20;
    }

    const MID_FINGER_CURLED = 2.8;
    const MID_FINGER_EXTENDED = 1.3;
    const OK_DIST_THRESHOLD = 0.35;
    const OK_OTHERS_EXTENDED = 1.12;
    const GESTURE_HYSTERESIS = 2;

    function isMiddleFingerGestureRaw(lm) {
      const { d8, d12, d16, d20 } = getFingerDistances(lm);
      const middleIsLongest = d12 > d8 && d12 > d16 && d12 > d20;
      const othersCurled = d8 < MID_FINGER_CURLED && d16 < MID_FINGER_CURLED && d20 < MID_FINGER_CURLED;
      const middleExtended = d12 > MID_FINGER_EXTENDED;
      return middleIsLongest && othersCurled && middleExtended;
    }

    function isOkGestureRaw(lm) {
      const thumbTip = lm[4], indexTip = lm[8];
      const dist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
      const palmBase = lm[9];
      const handSize = Math.hypot(palmBase.x - lm[0].x, palmBase.y - lm[0].y) || 0.01;
      const tips = [lm[12], lm[16], lm[20]];
      const othersExtended = tips.every(t => Math.hypot(t.x - lm[0].x, t.y - lm[0].y) / handSize > OK_OTHERS_EXTENDED);
      return dist < OK_DIST_THRESHOLD && othersExtended;
    }

    const HAND_CONNECTIONS = [
      [0,1],[1,5],[9,13],[13,17],[5,9],[0,17],
      [1,2],[2,3],[3,4],[5,6],[6,7],[7,8],
      [9,10],[10,11],[11,12],[13,14],[14,15],[15,16],
      [17,18],[18,19],[19,20]
    ];

    let handLandmarker = null;
    let lastPoint = null;
    let positionHistory = [];
    let stillStartTime = null;
    let countdownStart = null;
    let canDraw = false;
    let fistHistory = [];
    let wasClenched = false;
    let clenchedFrames = 0;
    let lastDrawTime = 0;
    let modalGestureFrames = 0;
    let smoothedPoint = null;
    let modalGestureType = null;
    let overlaySmoothed = null;
    const OVERLAY_SMOOTH = 0.2;
    let midFingerFrames = 0;
    let okGestureFrames = 0;
    let strokeRecording = [];
    let fistFlashState = null;

    const signModal = document.getElementById('signModal');
    const signPreviewCanvas = document.getElementById('signPreviewCanvas');
    const resignBtn = document.getElementById('resignBtn');
    const signConfirmBtn = document.getElementById('signConfirmBtn');
    const docSignBtn = document.getElementById('docSignBtn');
    const docScreen = document.getElementById('docScreen');
    const docSheet = document.getElementById('docSheet');
    const docSheetWrapper = document.getElementById('docSheetWrapper');
    const pdfCanvas = document.getElementById('pdfCanvas');
    const videoOverlay = document.getElementById('videoOverlay');

    function updateStatusPosition() {
      if (!videoOverlay.classList.contains('visible')) return;
      const rect = docSheet.getBoundingClientRect();
      status.style.display = 'block';
      status.style.position = 'fixed';
      status.style.top = (rect.bottom + 40) + 'px';
      status.style.left = '50%';
      status.style.transform = 'translateX(-50%)';
      status.style.width = '100%';
      status.style.maxWidth = '600px';
      status.style.marginTop = '0';
      status.style.zIndex = '150';
    }
    function resetStatusPosition() {
      status.style.display = 'none';
      status.style.position = '';
      status.style.top = '';
      status.style.left = '';
      status.style.transform = '';
      status.style.width = '';
      status.style.maxWidth = '';
      status.style.marginTop = '';
      status.style.zIndex = '';
    }

    const signModalPreview = document.getElementById('signModalPreview');
    let mouseTilt = { x: 0, y: 0 };
    let mouseOverPreview = false;
    signModalPreview.addEventListener('mousemove', (e) => {
      mouseOverPreview = true;
      const rect = signModalPreview.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      mouseTilt.x = (y - 0.5) * 8;
      mouseTilt.y = (x - 0.5) * 8;
    });
    signModalPreview.addEventListener('mouseleave', () => {
      mouseOverPreview = false;
      mouseTilt = { x: 0, y: 0 };
    });
    function updatePreviewTilt(handX, handY) {
      const previewRect = signModalPreview.getBoundingClientRect();
      let tiltX = mouseTilt.x, tiltY = mouseTilt.y;
      if (handX != null && handY != null && canvas.width > 0) {
        const canvasRect = canvas.getBoundingClientRect();
        const handScreenX = canvasRect.right - (handX / canvas.width) * canvasRect.width;
        const handScreenY = canvasRect.top + (handY / canvas.height) * canvasRect.height;
        const relX = (handScreenX - (previewRect.left + previewRect.width / 2)) / previewRect.width;
        const relY = (handScreenY - (previewRect.top + previewRect.height / 2)) / previewRect.height;
        const handTiltX = Math.max(-8, Math.min(8, relY * 12));
        const handTiltY = Math.max(-8, Math.min(8, relX * 12));
        const blend = mouseOverPreview ? 0.5 : 1;
        tiltX = handTiltX * blend + mouseTilt.x * (1 - blend);
        tiltY = handTiltY * blend + mouseTilt.y * (1 - blend);
      }
      signModalPreview.style.transform = `perspective(600px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
    }

    let docSheetMouseTilt = { x: 0, y: 0 };
    let mouseOverSheet = false;
    docSheet.addEventListener('mousemove', (e) => {
      mouseOverSheet = true;
      const rect = docSheet.getBoundingClientRect();
      docSheetMouseTilt.x = ((e.clientY - rect.top) / rect.height - 0.5) * 6;
      docSheetMouseTilt.y = ((e.clientX - rect.left) / rect.width - 0.5) * 6;
    });
    docSheet.addEventListener('mouseleave', () => {
      mouseOverSheet = false;
      docSheetMouseTilt = { x: 0, y: 0 };
    });

    function updateDocSheetAspectRatio() {
      const w = pdfCanvas.width || 600;
      const h = pdfCanvas.height || 848;
      docSheet.style.aspectRatio = `${w} / ${h}`;
    }

    async function loadPdf() {
      try {
        const pdfjsLib = window.pdfjsLib || globalThis.pdfjsLib;
        if (!pdfjsLib) throw new Error('PDF.js not loaded');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        const path = window.location.pathname;
        const dir = (path.endsWith('/') ? path : path.replace(/\/[^/]*$/, '/') || '/');
        const pdfUrl = window.location.origin + dir + 'A4-document.pdf';
        const resp = await fetch(pdfUrl);
        if (!resp.ok) throw new Error('PDF fetch: ' + resp.status + ' ' + pdfUrl);
        const data = await resp.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data }).promise;
        const page = await pdf.getPage(1);
        const scale = 2;
        const viewport = page.getViewport({ scale });
        pdfCanvas.width = viewport.width;
        pdfCanvas.height = viewport.height;
        const pdfCtx = pdfCanvas.getContext('2d');
        const renderCtx = { canvasContext: pdfCtx, viewport };
        await page.render(renderCtx).promise;
        updateDocSheetAspectRatio();
      } catch (e) {
        console.error('PDF load:', e);
        document.getElementById('docStatus').textContent = 'PDF load error: ' + (e.message || e);
        const ctx = pdfCanvas.getContext('2d');
        pdfCanvas.width = 600;
        pdfCanvas.height = 848;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 600, 848);
        ctx.fillStyle = '#333';
        ctx.font = '24px sans-serif';
        ctx.fillText('Document (PDF not loaded)', 40, 80);
        updateDocSheetAspectRatio();
      }
    }

    const addDocBtn = document.getElementById('addDocBtn');
    const addDocInput = document.getElementById('addDocInput');

    addDocBtn.onclick = () => addDocInput.click();

    const exportBtn = document.getElementById('exportBtn');
    exportBtn.onclick = async () => {
      try {
        const { jsPDF } = window.jspdf || globalThis.jspdf;
        if (!jsPDF) throw new Error('jsPDF not loaded');
        if (typeof html2canvas !== 'function') throw new Error('html2canvas not loaded');
        const canvas = await html2canvas(docSheet, {
          useCORS: true,
          allowTaint: true,
          scale: 2,
          backgroundColor: '#ffffff',
          logging: false
        });
        const imgData = canvas.toDataURL('image/png');
        const w = pdfCanvas.width || canvas.width;
        const h = pdfCanvas.height || canvas.height;
        const pdf = new jsPDF({
          orientation: w > h ? 'landscape' : 'portrait',
          unit: 'pt',
          format: [w, h]
        });
        pdf.addImage(imgData, 'PNG', 0, 0, w, h);
        pdf.save('signed-document.pdf');
      } catch (err) {
        console.error('Export error:', err);
        document.getElementById('docStatus').textContent = 'Export error: ' + (err.message || err);
      }
    };

    function resetDocSignatureState() {
      signatureContainer.innerHTML = '';
      signatureContainer.classList.remove('has-signature');
      signatureContainer.classList.add('hidden');
      docSignBtn.classList.remove('hidden');
      exportBtn.classList.add('hidden');
      addDocBtn.textContent = 'Add your own document';
    }

    addDocInput.onchange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      e.target.value = '';
      resetDocSignatureState();
      document.getElementById('docStatus').textContent = 'Loading...';
      try {
        const ext = (file.name.split('.').pop() || '').toLowerCase();
        if (ext === 'pdf') {
          const pdfjsLib = window.pdfjsLib || globalThis.pdfjsLib;
          if (!pdfjsLib) throw new Error('PDF.js not loaded');
          pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
          const data = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data }).promise;
          const page = await pdf.getPage(1);
          const scale = 2;
          const viewport = page.getViewport({ scale });
          pdfCanvas.width = viewport.width;
          pdfCanvas.height = viewport.height;
          const pdfCtx = pdfCanvas.getContext('2d');
          await page.render({ canvasContext: pdfCtx, viewport }).promise;
          updateDocSheetAspectRatio();
        } else {
          const img = new Image();
          const url = URL.createObjectURL(file);
          img.onload = () => {
            URL.revokeObjectURL(url);
            const maxW = 1200, maxH = 1696;
            let w = img.width, h = img.height;
            if (w > maxW || h > maxH) {
              const r = Math.min(maxW / w, maxH / h);
              w = Math.floor(w * r);
              h = Math.floor(h * r);
            }
            pdfCanvas.width = w;
            pdfCanvas.height = h;
            const ctx = pdfCanvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
            updateDocSheetAspectRatio();
            document.getElementById('docStatus').textContent = '';
          };
          img.onerror = () => { URL.revokeObjectURL(url); document.getElementById('docStatus').textContent = 'Failed to load image'; };
          img.src = url;
          return;
        }
        document.getElementById('docStatus').textContent = '';
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('docStatus').textContent = 'Load error: ' + (err.message || err);
      }
    };

    docSignBtn.onclick = () => {

    function showSignModal() {
      const srcW = drawCanvas.width, srcH = drawCanvas.height;
      const imgData = drawCtx.getImageData(0, 0, srcW, srcH);
      const data = imgData.data;
      let minX = srcW, minY = srcH, maxX = 0, maxY = 0;
      for (let y = 0; y < srcH; y++) {
        for (let x = 0; x < srcW; x++) {
          const i = (y * srcW + x) * 4;
          const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
          if (a > 10 && (r < 250 || g < 250 || b < 250)) {
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
          }
        }
      }
      if (minX > maxX) { minX = 0; maxX = srcW; minY = 0; maxY = srcH; }
      const pad = 8;
      const contentW = Math.max(1, maxX - minX + pad * 2);
      const contentH = Math.max(1, maxY - minY + pad * 2);
      const previewW = 360, previewH = 180;
      const margin = 0.03;
      const scale = Math.min((previewW * (1 - margin * 2)) / contentW, (previewH * (1 - margin * 2)) / contentH);
      signPreviewCanvas.width = previewW;
      signPreviewCanvas.height = previewH;
      const pCtx = signPreviewCanvas.getContext('2d');
      pCtx.clearRect(0, 0, previewW, previewH);
      pCtx.imageSmoothingEnabled = true;
      pCtx.imageSmoothingQuality = 'high';
      pCtx.save();
      const drawW = contentW * scale, drawH = contentH * scale;
      const dx = (previewW - drawW) / 2;
      const dy = (previewH - drawH) / 2;
      pCtx.translate(dx + drawW, dy);
      pCtx.scale(-scale, scale);
      const sx = Math.max(0, minX - pad);
      const sy = Math.max(0, minY - pad);
      const sw = Math.min(srcW - sx, contentW);
      const sh = Math.min(srcH - sy, contentH);
      pCtx.drawImage(drawCanvas, sx, sy, sw, sh, 0, 0, contentW, contentH);
      pCtx.restore();
      modalGestureFrames = 0;
      modalGestureType = null;
      resignBtn.classList.remove('activating');
      signConfirmBtn.classList.remove('activating');
      resignBtn.querySelector('.btnProgress').style.width = '0%';
      signConfirmBtn.querySelector('.btnProgress').style.width = '0%';
      signModal.classList.add('visible');
    }

    resignBtn.onclick = () => {
      signModal.classList.remove('visible');
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      lastPoint = null;
      smoothedPoint = null;
      strokeRecording = [];
      canDraw = false;
    };

    const signatureContainer = document.getElementById('signatureContainer');

    function animateSignatureOnDoc(strokes, srcW, srcH, dataUrl, onComplete) {
      const segs = (strokes || []).filter(s => s && s.from && s.ctrl && s.to);
      if (segs.length === 0 || srcW <= 0 || srcH <= 0) {
        onComplete();
        return;
      }
      const animCanvas = document.createElement('canvas');
      requestAnimationFrame(() => {
      const sheetRect = docSheet.getBoundingClientRect();
      const targetW = sheetRect.width * 0.42;
      const targetH = 240;
      const safeW = Math.max(targetW, 1);
      const safeH = Math.max(targetH, 48);
      const scaleX = safeW / Math.max(srcW, 1);
      const scaleY = safeH / Math.max(srcH, 1);
      const scale = Math.min(scaleX, scaleY, 2);
      const dpr = Math.min(window.devicePixelRatio || 2, 3);
      const logicalW = Math.max(1, srcW * scale);
      const logicalH = Math.max(1, srcH * scale);
      animCanvas.width = Math.floor(logicalW * dpr);
      animCanvas.height = Math.floor(logicalH * dpr);
      animCanvas.style.width = logicalW + 'px';
      animCanvas.style.height = logicalH + 'px';
      signatureContainer.innerHTML = '';
      signatureContainer.appendChild(animCanvas);
      const aCtx = animCanvas.getContext('2d');
      aCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      aCtx.strokeStyle = '#0038E9';
      aCtx.lineWidth = Math.max(3, 5 * scale);
      aCtx.lineCap = 'round';
      aCtx.lineJoin = 'round';
      aCtx.imageSmoothingEnabled = true;
      aCtx.imageSmoothingQuality = 'high';
      const segDuration = 35;
      const totalDuration = Math.min(segs.length * segDuration, 2200);
      const startTime = performance.now();
      function drawFrame(now) {
        const elapsed = now - startTime;
        const progress = Math.min(1, elapsed / totalDuration);
        const segsToDraw = Math.floor(progress * segs.length);
        aCtx.save();
        aCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        aCtx.clearRect(0, 0, logicalW, logicalH);
        aCtx.translate(logicalW, 0);
        aCtx.scale(-1, 1);
        for (let i = 0; i < segsToDraw; i++) {
          const s = segs[i];
          if (!s) continue;
          const x0 = s.from.x * scale, y0 = s.from.y * scale;
          const cpx = s.ctrl.x * scale, cpy = s.ctrl.y * scale;
          const x1 = s.to.x * scale, y1 = s.to.y * scale;
          aCtx.beginPath();
          aCtx.moveTo(x0, y0);
          aCtx.quadraticCurveTo(cpx, cpy, x1, y1);
          aCtx.stroke();
        }
        if (segsToDraw < segs.length) {
          const partial = segs[segsToDraw];
          if (partial) {
            const segProgress = (progress * segs.length) % 1;
            aCtx.beginPath();
            aCtx.moveTo(partial.from.x * scale, partial.from.y * scale);
            for (let t = 0; t <= segProgress; t += 0.05) {
              const x = (1-t)*(1-t)*partial.from.x + 2*t*(1-t)*partial.ctrl.x + t*t*partial.to.x;
              const y = (1-t)*(1-t)*partial.from.y + 2*t*(1-t)*partial.ctrl.y + t*t*partial.to.y;
              aCtx.lineTo(x * scale, y * scale);
            }
            aCtx.stroke();
          }
        }
        aCtx.restore();
        if (progress < 1) requestAnimationFrame(drawFrame);
        else onComplete();
      }
      requestAnimationFrame(drawFrame);
      });
    }

    function setupSignatureDrag(el) {
      let dragStart = { x: 0, y: 0 };
      el.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        e.preventDefault();
        const rect = el.getBoundingClientRect();
        const sheetRect = docSheet.getBoundingClientRect();
        dragStart = { x: e.clientX, y: e.clientY };
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        el.style.left = (rect.left - sheetRect.left) + 'px';
        el.style.top = (rect.top - sheetRect.top) + 'px';
        const onMove = (e2) => {
          const dx = e2.clientX - dragStart.x;
          const dy = e2.clientY - dragStart.y;
          el.style.left = (parseFloat(el.style.left) + dx) + 'px';
          el.style.top = (parseFloat(el.style.top) + dy) + 'px';
          dragStart = { x: e2.clientX, y: e2.clientY };
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
      el.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        e.preventDefault();
        const t = e.touches[0];
        const rect = el.getBoundingClientRect();
        const sheetRect = docSheet.getBoundingClientRect();
        dragStart = { x: t.clientX, y: t.clientY };
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        el.style.left = (rect.left - sheetRect.left) + 'px';
        el.style.top = (rect.top - sheetRect.top) + 'px';
        const onMove = (e2) => {
          const t2 = e2.touches[0];
          const dx = t2.clientX - dragStart.x;
          const dy = t2.clientY - dragStart.y;
          el.style.left = (parseFloat(el.style.left) + dx) + 'px';
          el.style.top = (parseFloat(el.style.top) + dy) + 'px';
          dragStart = { x: t2.clientX, y: t2.clientY };
        };
        const onEnd = () => {
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onEnd);
        };
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
      }, { passive: false });
    }

    signConfirmBtn.onclick = () => {

    function drawTextUnmirrored(text, x, y, opts = {}) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(-1, 1);
      ctx.translate(-x, -y);
      ctx.fillStyle = opts.fill || '#fff';
      ctx.font = opts.font || '12px sans-serif';
      ctx.textAlign = opts.align || 'left';
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawSkeleton(lm, w, h) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      for (const [a, b] of HAND_CONNECTIONS) {
        if (a < lm.length && b < lm.length) {
          ctx.beginPath();
          ctx.moveTo(lm[a].x * w, lm[a].y * h);
          ctx.lineTo(lm[b].x * w, lm[b].y * h);
          ctx.stroke();
        }
      }
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#ccc';
      for (let i = 0; i < lm.length; i++) {
        ctx.beginPath();
        ctx.arc(lm[i].x * w, lm[i].y * h, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    function drawFistSkeletonGreen(lm, w, h, progress) {
      ctx.save();
      ctx.strokeStyle = `rgba(0, 220, 110, ${0.3 + 0.7 * progress})`;
      ctx.lineWidth = 2 + 3 * progress;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (const [a, b] of HAND_CONNECTIONS) {
        if (a < lm.length && b < lm.length) {
          ctx.beginPath();
          ctx.moveTo(lm[a].x * w, lm[a].y * h);
          ctx.lineTo(lm[b].x * w, lm[b].y * h);
          ctx.stroke();
        }
      }
      ctx.fillStyle = `rgba(0, 220, 110, ${0.4 + 0.6 * progress})`;
      for (let i = 0; i < lm.length; i++) {
        ctx.beginPath();
        ctx.arc(lm[i].x * w, lm[i].y * h, 2 + 1.5 * progress, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawFistFlash(fs) {
      const elapsed = performance.now() - fs.startTime;
      const dur = 280;
      const t = Math.min(1, elapsed / dur);
      const radius = 20 + 70 * t;
      const alpha = 0.5 * (1 - t) * (1 - t);
      if (t >= 1) { fistFlashState = null; return; }
      ctx.save();
      const g = ctx.createRadialGradient(fs.x, fs.y, 0, fs.x, fs.y, radius);
      g.addColorStop(0, `rgba(0, 220, 130, ${alpha * 0.8})`);
      g.addColorStop(0.5, `rgba(0, 200, 100, ${alpha * 0.3})`);
      g.addColorStop(1, 'rgba(0, 180, 90, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(fs.x, fs.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    async function init() {
      try {
        status.textContent = 'Loading MediaPipe...';
        const mod = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');
        const HandLandmarker = mod.HandLandmarker;
        const FilesetResolver = mod.FilesetResolver;
        const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: MODEL_URL },
          numHands: 1,
          runningMode: 'VIDEO',
          minHandDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });
        status.textContent = 'Requesting camera...';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = stream;
        await video.play();
        status.textContent = 'Extend index finger and hold 1.5 sec...';
        requestAnimationFrame(detect);
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        console.error(e);
      }
    }

    function detect() {
      if (!handLandmarker || video.readyState < 2) {
        requestAnimationFrame(detect);
        return;
      }
      const result = handLandmarker.detectForVideo(video, performance.now());
      const w = video.videoWidth;
      const h = video.videoHeight;
      if (w === 0 || h === 0) {
        requestAnimationFrame(detect);
        return;
      }
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
        drawCanvas.width = w;
        drawCanvas.height = h;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let indexPointing = false;
      let holdProgress = 0;
      if (result.landmarks && result.landmarks.length > 0) {
        const lm = result.landmarks[0];
        if (isMiddleFingerGestureRaw(lm)) midFingerFrames++; else midFingerFrames = 0;
        if (isOkGestureRaw(lm)) okGestureFrames++; else okGestureFrames = 0;
        const midFinger = okGestureFrames >= GESTURE_HYSTERESIS;
        const okGesture = midFingerFrames >= GESTURE_HYSTERESIS;
        let tip = lm[FINGER_TIP];
        if (signModal.classList.contains('visible')) {
          if (okGesture) tip = lm[12];
          else if (midFinger) tip = { x: (lm[4].x + lm[8].x) / 2, y: (lm[4].y + lm[8].y) / 2 };
        }
        const rawX = tip.x * canvas.width;
        const rawY = tip.y * canvas.height;
        if (!overlaySmoothed) overlaySmoothed = { x: rawX, y: rawY };
        overlaySmoothed.x += (rawX - overlaySmoothed.x) * OVERLAY_SMOOTH;
        overlaySmoothed.y += (rawY - overlaySmoothed.y) * OVERLAY_SMOOTH;
        const x = overlaySmoothed.x;
        const y = overlaySmoothed.y;

        if (!videoOverlay.classList.contains('visible') && docSheet && canvas.width > 0) {
          const sheetRect = docSheet.getBoundingClientRect();
          const canvasRect = canvas.getBoundingClientRect();
          let handScreenX, handScreenY;
          if (canvasRect.width > 0 && canvasRect.height > 0) {
            handScreenX = canvasRect.right - (x / canvas.width) * canvasRect.width;
            handScreenY = canvasRect.top + (y / canvas.height) * canvasRect.height;
          } else {
            handScreenX = window.innerWidth * (1 - x / canvas.width);
            handScreenY = window.innerHeight * (y / canvas.height);
          }
          if (sheetRect.width > 0) {
            const relX = (handScreenX - (sheetRect.left + sheetRect.width / 2)) / sheetRect.width;
            const relY = (handScreenY - (sheetRect.top + sheetRect.height / 2)) / sheetRect.height;
            const handTiltX = Math.max(-6, Math.min(6, relY * 10));
            const handTiltY = Math.max(-6, Math.min(6, relX * 10));
            const blend = mouseOverSheet ? 0.5 : 1;
            const tiltX = handTiltX * blend + docSheetMouseTilt.x * (1 - blend);
            const tiltY = handTiltY * blend + docSheetMouseTilt.y * (1 - blend);
            docSheet.style.transform = `perspective(800px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
          }
        }
        if (signModal.classList.contains('visible')) {
          updatePreviewTilt(x, y);
          const pct = Math.min(100, (modalGestureFrames / GESTURE_CONFIRM_FRAMES) * 100);
          if (midFinger) {
            if (modalGestureType === 'sign') modalGestureFrames++; else { modalGestureType = 'sign'; modalGestureFrames = 1; }
            if (modalGestureFrames >= GESTURE_CONFIRM_FRAMES) { signConfirmBtn.click(); modalGestureFrames = 0; modalGestureType = null; }
            signConfirmBtn.classList.add('activating');
            signConfirmBtn.querySelector('.btnProgress').style.width = pct + '%';
            resignBtn.classList.remove('activating');
            resignBtn.querySelector('.btnProgress').style.width = '0%';
          } else if (okGesture) {
            if (modalGestureType === 'resign') modalGestureFrames++; else { modalGestureType = 'resign'; modalGestureFrames = 1; }
            if (modalGestureFrames >= GESTURE_CONFIRM_FRAMES) { resignBtn.click(); modalGestureFrames = 0; modalGestureType = null; }
            resignBtn.classList.add('activating');
            resignBtn.querySelector('.btnProgress').style.width = pct + '%';
            signConfirmBtn.classList.remove('activating');
            signConfirmBtn.querySelector('.btnProgress').style.width = '0%';
          } else {
            modalGestureFrames = 0;
            modalGestureType = null;
            resignBtn.classList.remove('activating');
            signConfirmBtn.classList.remove('activating');
            resignBtn.querySelector('.btnProgress').style.width = '0%';
            signConfirmBtn.querySelector('.btnProgress').style.width = '0%';
          }
        }

        drawSkeleton(lm, canvas.width, canvas.height);

        positionHistory.push({ x, y, t: performance.now() });
        if (positionHistory.length > STILL_FRAMES_3SEC) positionHistory.shift();

        const isStill = positionHistory.length >= STILL_FRAMES_3SEC && (() => {
          const recent = positionHistory.slice(-STILL_FRAMES_3SEC);
          const mx = recent.reduce((s, p) => s + p.x, 0) / recent.length;
          const my = recent.reduce((s, p) => s + p.y, 0) / recent.length;
          return recent.every(p => Math.hypot(p.x - mx, p.y - my) < STILL_THRESHOLD_PX);
        })();
        const isStillIndex = positionHistory.length >= INDEX_HOLD_FRAMES && (() => {
          const recent = positionHistory.slice(-INDEX_HOLD_FRAMES);
          const mx = recent.reduce((s, p) => s + p.x, 0) / recent.length;
          const my = recent.reduce((s, p) => s + p.y, 0) / recent.length;
          return recent.every(p => Math.hypot(p.x - mx, p.y - my) < INDEX_HOLD_THRESHOLD_PX);
        })();

        const clenched = isFist(lm);
        indexPointing = isIndexPointing(lm);

        if (!canDraw && !signModal.classList.contains('visible') && exportBtn.classList.contains('hidden') && indexPointing && positionHistory.length >= 2) {
          holdProgress = 0;
          for (let n = 2; n <= Math.min(positionHistory.length, INDEX_HOLD_FRAMES); n++) {
            const recent = positionHistory.slice(-n);
            const mx = recent.reduce((s, p) => s + p.x, 0) / n;
            const my = recent.reduce((s, p) => s + p.y, 0) / n;
            if (recent.every(p => Math.hypot(p.x - mx, p.y - my) < INDEX_HOLD_THRESHOLD_PX)) {
              holdProgress = (n / INDEX_HOLD_FRAMES) * 100;
            } else break;
          }
        }

        const confirmGesture = clenched || (okGestureFrames >= GESTURE_HYSTERESIS);
        if (confirmGesture) {
          clenchedFrames++;
          if (clenchedFrames >= 10) wasClenched = true;
        } else {
          if (wasClenched) {
            fistHistory = [];
          }
          wasClenched = false;
          clenchedFrames = 0;
        }

        if (canDraw && !signModal.classList.contains('visible') && exportBtn.classList.contains('hidden')) {
          if (confirmGesture) {
            lastPoint = null;
            smoothedPoint = null;
            fistHistory.push(true);
            if (fistHistory.length > GESTURE_CONFIRM_FRAMES) fistHistory.shift();
            if (fistHistory.length >= GESTURE_CONFIRM_FRAMES) {
              fistHistory = [];
              fistFlashState = { startTime: performance.now(), x, y };
              showSignModal();
            } else {
              const secLeft = Math.ceil(1.5 - fistHistory.length / 30);
              status.textContent = clenched ? `Sign in ${secLeft} sec` : `OK in ${secLeft} sec`;
              const progress = fistHistory.length / GESTURE_CONFIRM_FRAMES;
              drawFistSkeletonGreen(lm, canvas.width, canvas.height, progress);
            }
          } else if (isStill && (performance.now() - lastDrawTime) > 3000) {
            canDraw = false;
            countdownStart = null;
            lastPoint = null;
            smoothedPoint = null;
            positionHistory = [];
            fistHistory = [];
            status.textContent = 'Extend index finger and hold 1.5 sec...';
          } else {
            fistHistory = [];
            const canDrawThisFrame = indexPointing || isIndexExtendedRelative(lm);
            if (canDrawThisFrame) {
              if (!smoothedPoint) smoothedPoint = { x, y };
              smoothedPoint.x += (x - smoothedPoint.x) * 0.35;
              smoothedPoint.y += (y - smoothedPoint.y) * 0.35;
              const sx = smoothedPoint.x, sy = smoothedPoint.y;
              if (lastPoint) {
                const cpx = (lastPoint.x + sx) / 2;
                const cpy = (lastPoint.y + sy) / 2;
                strokeRecording.push({ from: { x: lastPoint.x, y: lastPoint.y }, ctrl: { x: cpx, y: cpy }, to: { x: sx, y: sy } });
                drawCtx.strokeStyle = '#0038E9';
                drawCtx.lineWidth = 5;
                drawCtx.lineCap = 'round';
                drawCtx.lineJoin = 'round';
                drawCtx.beginPath();
                drawCtx.moveTo(lastPoint.x, lastPoint.y);
                drawCtx.quadraticCurveTo(cpx, cpy, sx, sy);
                drawCtx.stroke();
              }
              lastPoint = { x: sx, y: sy };
              lastDrawTime = performance.now();
              ctx.fillStyle = 'rgba(0,180,90,0.45)';
              ctx.beginPath();
              ctx.arc(x, y, 9, 0, Math.PI * 2);
              ctx.fill();
              status.textContent = 'You can draw!';
            } else {
              smoothedPoint = null;
              status.textContent = isOtherFingersCurled(lm) ? 'Fist or OK to confirm' : 'Extend index finger';
            }
          }
        } else if (isStillIndex && indexPointing && !signModal.classList.contains('visible') && exportBtn.classList.contains('hidden')) {
          canDraw = true;
          countdownStart = null;
          positionHistory = [];
          lastDrawTime = performance.now();
          status.textContent = 'You can draw!';
        } else if (isStill && !indexPointing) {
          countdownStart = null;
          status.textContent = 'Extend index finger';
        } else {
          countdownStart = null;
          if (indexPointing && holdProgress > 0) {
            const r = 12 * (holdProgress / 100);
            ctx.fillStyle = 'rgba(0,180,90,0.5)';
            ctx.beginPath();
            ctx.arc(x, y, Math.max(2, r), 0, Math.PI * 2);
            ctx.fill();
            status.textContent = `Hold ${Math.ceil(1.5 * (1 - holdProgress / 100))} more sec`;
          }
          lastPoint = null;
          smoothedPoint = null;
        }
      } else {
        positionHistory = [];
        countdownStart = null;
        lastPoint = null;
        smoothedPoint = null;
        overlaySmoothed = null;
        midFingerFrames = 0;
        okGestureFrames = 0;
        fistHistory = [];
        fistFlashState = null;
        wasClenched = false;
        clenchedFrames = 0;
        if (canDraw) status.textContent = 'Return hand to frame';
        else status.textContent = 'Extend index finger and hold 1.5 sec...';
        if (signModal.classList.contains('visible')) {
          updatePreviewTilt(null, null);
        }
        if (!videoOverlay.classList.contains('visible') && docSheet && !mouseOverSheet) {
          docSheet.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
        }
      }

      holdIndicator.classList.toggle('ready', canDraw);
      holdIndicator.style.setProperty('--hold-progress', holdProgress);
      holdIndicator.classList.toggle('filling', !canDraw && holdProgress > 0);
      const secLeft = holdProgress < 100 ? Math.ceil(1.5 * (1 - holdProgress / 100)) : 0;
      holdIndicator.querySelector('.holdLabel').textContent = canDraw ? 'sign' : (holdProgress > 0 ? secLeft + 's' : 'hold');

      if (fistFlashState) drawFistFlash(fistFlashState);

      requestAnimationFrame(detect);
    }

    loadPdf();
    init();
  </script>
</body>
</html>
